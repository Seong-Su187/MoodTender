<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodTender</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <h1>MoodTender</h1>
      <span class="subtitle">감정 바텐더</span>
    </div>
    <div class="header-right">
      <span id="username-badge" class="username-badge"></span>
      <div class="model-bar">
        <span id="model-status-text">모델 미로드</span>
        <button id="load-model-btn" type="button" onclick="loadModel()">모델 로드</button>
      </div>
      <button id="logout-btn" type="button" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-header">아바타 설정</div>
        <p id="avatar-status" class="status-text">기본 바텐더 사용 중</p>
        <label class="field-label" for="avatar-select">영상 선택</label>
        <select id="avatar-select">
          <option value="">기본 바텐더</option>
        </select>
      </div>

      <div class="panel">
        <div class="panel-header">목소리</div>
        <label class="field-label" for="voice-select">응답 음성</label>
        <select id="voice-select"></select>
        <label class="field-label" for="speed-select">말하기 속도</label>
        <select id="speed-select">
          <option value="0.8">0.8배속 (느리게)</option>
          <option value="1.0" selected>1.0배속 (기본)</option>
          <option value="1.2">1.2배속 (빠르게)</option>
        </select>
      </div>
    </aside>

    <section class="chat-stage">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <div class="stage-top">
        <div class="stage-title">
          <span class="stage-kicker">MoodTender Live Bar</span>
          <strong>오늘 기분을 천천히 들려주세요.</strong>
        </div>
        <p id="gen-status" class="status-text"></p>
      </div>

      <div class="chat-layout">
        <div id="chat-log" class="chat-log" aria-live="polite">
          <div class="message-row assistant">
            <div class="message-time">방금 전</div>
            <div class="message-bubble">어서오세요. 오늘 마음은 어떤 잔에 담아드릴까요?</div>
          </div>
        </div>

        <div class="avatar-output" aria-label="아바타 영상 출력">
          <video id="video-output" controls></video>
          <div id="video-placeholder">
            <span>아바타 영상이 여기에 표시됩니다.</span>
          </div>
        </div>
      </div>

      <form class="chat-composer" onsubmit="event.preventDefault(); generateChat();">
        <button id="mic-btn" class="composer-icon-btn" type="button" title="음성 입력" aria-label="음성 입력">
          <span class="icon-mic"></span>
        </button>
        <input id="text-input" type="text" autocomplete="off" placeholder="메시지를 입력해 주세요." />
        <button id="generate-btn" class="send-btn" type="submit" disabled aria-label="메시지 전송">
          <span class="send-arrow"></span>
        </button>
      </form>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodTender - 로그인</title>
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/assets/login_loading.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay"></div>

  <div class="container">
    <h1>MoodTender</h1>
    <p class="subtitle">심야의 감정 바텐더</p>

    <!-- 로그인 뷰 -->
    <div id="loginView">
      <form id="loginForm">
        <input type="text" id="loginUsername" placeholder="계정이름" required />
        <input type="password" id="loginPassword" placeholder="비밀번호" required />
        <button type="submit" class="arrow-btn" aria-label="로그인">
          <span class="arrow-icon"></span>
        </button>
      </form>
      <p id="loginMessage" class="message"></p>
      <p class="switch-line">
        첫 방문이신가요?<br />
        <button type="button" id="showSignupBtn" class="link-btn">계정 생성</button>
      </p>
    </div>

    <!-- 회원가입 뷰 -->
    <div id="signupView" class="hidden">
      <form id="signupForm">
        <div class="input-group">
          <input type="text" id="signupUsername" placeholder="사용할 아이디" required />
          <button type="button" id="checkIdBtn" class="small-btn">중복확인</button>
        </div>
        <input type="password" id="signupPassword" placeholder="비밀번호" required />
        <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 확인" required />
        <button type="submit" class="arrow-btn" aria-label="가입 완료">
          <span class="arrow-icon"></span>
        </button>
      </form>
      <p id="signupMessage" class="message"></p>
      <p class="switch-line">
        이미 계정이 있으신가요?<br />
        <button type="button" id="showLoginBtn" class="link-btn">로그인으로 돌아가기</button>
      </p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>

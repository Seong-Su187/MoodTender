<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTender Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/monthly.css">
    <style>
        body {
            color: #f4ecd9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
            background:
                linear-gradient(rgba(15, 10, 6, 0.74), rgba(15, 10, 6, 0.84)),
                url('/assets/dashboard-bg.jpeg') center center / cover no-repeat fixed;
            background-color: #140f0a;
            min-height: 100vh;
        }
        .serif { font-family: 'Playfair Display', serif; }
        .surface {
            background: linear-gradient(180deg, rgba(42, 30, 17, 0.62), rgba(28, 19, 11, 0.58));
            border: 1px solid rgba(200, 160, 90, 0.22);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s, border-color 0.25s;
        }
        .surface:hover {
            transform: translateY(-3px);
            border-color: rgba(200, 160, 90, 0.4);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
        }
        .accent-text { color: #d9b65a; }
        .danger-text { color: #e0746b; }
        .muted-text { color: #b3a48c; }
        
        /* 스크롤바 커스텀 */
        html, body, * {
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 144, 46, 0.45) rgba(20, 15, 10, 0.92);
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(20, 15, 10, 0.92); margin: 6px 0; }
        ::-webkit-scrollbar-thumb {
            background: rgba(200, 144, 46, 0.4);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(200, 144, 46, 0.65); }

        /* 날짜 입력창 커스텀 (다크/골드 테마) */
        input[type="date"] {
            background-color: rgba(15, 10, 6, 0.6);
            border: 1px solid rgba(200, 160, 90, 0.4);
            color: #f4ecd9;
            color-scheme: dark;
        }
        input[type="date"]:focus {
            outline: none;
            border-color: #d9b65a;
            box-shadow: 0 0 8px rgba(217, 182, 90, 0.3);
        }
    </style>
</head>
<body class="p-6 md:p-10 min-h-screen">

    <div class="max-w-5xl mx-auto space-y-6">

        <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="serif text-3xl font-bold tracking-tight" style="color:#e8c884; text-shadow:0 2px 14px rgba(200,144,46,0.3);">MoodTender Analytics</h1>
                <p class="muted-text text-sm mt-1">스마트폰에서 수집된 나의 생활 패턴과 멘탈 상태를 확인하세요.</p>
            </div>
        </header>

        <div class="surface rounded-2xl p-4 shadow-lg flex flex-wrap gap-4 items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">📅</span>
                <h2 class="text-base font-bold">기간 설정</h2>
            </div>
            <div class="flex items-center gap-2 md:gap-4 flex-wrap">
                <input type="date" id="startDate" class="rounded-lg p-2 text-sm">
                <span class="muted-text">~</span>
                <input type="date" id="endDate" class="rounded-lg p-2 text-sm">
                <button id="filterBtn" class="text-sm px-4 py-2 rounded-lg font-bold text-[#140f0a]" style="background: linear-gradient(135deg, #d9b65a, #c8902e); transition: opacity 0.2s;">
                    조회
                </button>
                <button id="resetBtn" class="text-sm px-4 py-2 rounded-lg font-bold border border-[#c8902e] text-[#c8902e] hover:bg-[#c8902e] hover:text-[#140f0a] transition-colors">
                    전체보기
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">마지막 기록 걸음 수</h3>
                <p id="card-steps" class="text-3xl font-bold accent-text">- 보</p>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">마지막 기록 수면</h3>
                <p id="card-sleep" class="text-3xl font-bold" style="color:#c8902e;">- 시간 - 분</p>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">마지막 기록 스크린타임</h3>
                <p id="card-screen" class="text-3xl font-bold danger-text">- 분</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-bold mb-4">걸음 수 추이</h2>
                <div class="relative h-72 w-full">
                    <canvas id="stepChart"></canvas>
                </div>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-bold mb-4">스마트폰 사용 추이</h2>
                <div class="relative h-72 w-full">
                    <canvas id="screenChart"></canvas>
                </div>
            </div>
        </div>

        <div class="surface rounded-2xl p-6 shadow-lg">
            <div class="flex items-center mb-4 gap-2">
                <span class="text-xl">🥃</span>
                <h2 class="text-lg font-bold">바텐더의 상태 분석</h2>
            </div>
            <div id="ai-report" class="text-sm leading-relaxed p-4 rounded-xl" style="background: rgba(15,10,6,0.5); border: 1px solid rgba(200,160,90,0.15); color:#f4ecd9;">
                데이터를 분석하고 있습니다...
            </div>
        </div>

        <div style="padding-top: 8px;">
            <button class="monthly-open-btn" onclick="openMonthlyFromParent()">
                📈 감정 월간 분석
            </button>
        </div>

    </div>

    <script>
        function openMonthlyFromParent() {
            window.parent.postMessage({ type: 'openMonthly' }, '*');
        }

        // 🚀 2. 전역 변수: 전체 데이터 보관 및 그래프 인스턴스 관리
        let allRecords = [];
        let stepChartInstance = null;
        let screenChartInstance = null;

        // Date 객체 -> YYYY-MM-DD (로컬 기준) 문자열 변환
        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 오늘 날짜(YYYY-MM-DD, 로컬 기준) 문자열 반환
        function getTodayString() {
            return formatDate(new Date());
        }

        // 🚀 기간 선택을 최대 7일로 제한 (start/end 중 방금 변경된 쪽을 기준으로 반대쪽 min/max 보정)
        const MAX_RANGE_DAYS = 7;
        function clampDateRange(changed) {
            const startInput = document.getElementById('startDate');
            const endInput = document.getElementById('endDate');
            if (!startInput.value || !endInput.value) return;

            if (changed === 'start') {
                const start = new Date(startInput.value);
                const maxEnd = new Date(start);
                maxEnd.setDate(maxEnd.getDate() + (MAX_RANGE_DAYS - 1));

                endInput.min = startInput.value;
                endInput.max = formatDate(maxEnd);

                // 기존 endDate가 새 범위를 벗어나면 -> 일단 startDate와 같은 날(1일 선택)로 맞춤
                if (endInput.value < endInput.min || endInput.value > endInput.max) {
                    endInput.value = startInput.value;
                }
            } else {
                const end = new Date(endInput.value);
                const minStart = new Date(end);
                minStart.setDate(minStart.getDate() - (MAX_RANGE_DAYS - 1));

                startInput.max = endInput.value;
                startInput.min = formatDate(minStart);

                // 기존 startDate가 새 범위를 벗어나면 -> 일단 endDate와 같은 날(1일 선택)로 맞춤
                if (startInput.value < startInput.min || startInput.value > startInput.max) {
                    startInput.value = endInput.value;
                }
            }
        }

        // 🚀 바텐더의 상태 분석 리포트 가져오기 (조회 기간: startDate~endDate, 최대 7일)
        async function fetchAiReport(startDate, endDate) {
            const token = localStorage.getItem("access_token");
            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };

            document.getElementById('ai-report').innerHTML = "데이터를 분석하고 있습니다...";

            try {
                const params = new URLSearchParams();
                if (startDate) params.set('start_date', startDate);
                if (endDate) params.set('end_date', endDate);

                const url = `/api/web/analyze?${params.toString()}`;
                const aiResponse = await fetch(url, { headers });
                const aiResult = await aiResponse.json();
                document.getElementById('ai-report').innerHTML = aiResult.report;
            } catch (error) {
                console.error("AI 리포트 로드 실패:", error);
                document.getElementById('ai-report').innerHTML = "<span style='color:#e0746b;'>리포트를 불러오지 못했습니다.</span>";
            }
        }

        async function loadDashboard() {
            const token = localStorage.getItem("access_token");
            
            if (!token) {
                alert("로그인이 필요합니다.");
                window.location.href = "/login.html"; 
                return;
            }

            try {
                const headers = {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                };

                // 서버에서 데이터 전체 가져오기
                const response = await fetch('/api/web/data', { headers });
                
                if (response.status === 401) {
                    alert("세션이 만료되었습니다. 다시 로그인해주세요.");
                    localStorage.removeItem("access_token");
                    window.location.href = "/login.html";
                    return;
                }

                const result = await response.json();
                allRecords = result.data || [];

                if (allRecords.length === 0) {
                    document.getElementById('ai-report').innerHTML = "아직 수집된 모바일 데이터가 없습니다.";
                    return;
                }

                // 날짜 기본값 세팅: 차트/카드/바텐더의 상태 분석 모두 '오늘' 기준이 기본값
                const todayStr = getTodayString();
                document.getElementById('startDate').value = todayStr;
                document.getElementById('endDate').value = todayStr;
                clampDateRange('end'); // 시작일의 선택 가능 범위를 오늘 기준 최대 7일로 초기화

                // 🚀 화면 렌더링 호출 (기간 설정과 동일하게 '오늘' 기준으로 필터링)
                renderDashboard(getFilteredRecords());

                // AI 리포트 가져오기 (오늘 하루 기준)
                await fetchAiReport(todayStr, todayStr);

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('ai-report').innerHTML = "<span style='color:#e0746b;'>서버 연결에 실패했습니다.</span>";
            }
        }

        // 🚀 2-1. 현재 선택된 기간(startDate~endDate)으로 allRecords를 걸러서 반환
        function getFilteredRecords() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            let filtered = allRecords;
            if (startDate) {
                filtered = filtered.filter(r => r.recordDate >= startDate);
            }
            if (endDate) {
                filtered = filtered.filter(r => r.recordDate <= endDate);
            }
            return filtered;
        }

        // 🚀 3. 화면을 그리는 전담 함수 (필터링 시 재사용)
        function renderDashboard(recordsToRender) {
            if (recordsToRender.length === 0) {
                // 해당 기간에 데이터가 없으면 빈 상태로 표시 (알림창 없이 조용히 처리)
                document.getElementById('card-steps').innerText = '- 보';
                document.getElementById('card-sleep').innerText = '- 시간 - 분';
                document.getElementById('card-screen').innerText = '- 분';

                if (stepChartInstance) stepChartInstance.destroy();
                if (screenChartInstance) screenChartInstance.destroy();
                stepChartInstance = null;
                screenChartInstance = null;
                return;
            }

            // 상단 카드 업데이트 (선택된 기간의 가장 최신 데이터 기준)
            const latest = recordsToRender[recordsToRender.length - 1];
            document.getElementById('card-steps').innerText = latest.stepCount.toLocaleString() + ' 보';

            const sleepHours = Math.floor(latest.sleepMinutes / 60);
            const sleepMins = latest.sleepMinutes % 60;
            document.getElementById('card-sleep').innerText = `${sleepHours}시간 ${sleepMins}분`;
            document.getElementById('card-screen').innerText = latest.screenTimeMinutes + ' 분';

            // 차트 데이터 추출
            const labels = recordsToRender.map(r => r.recordDate);
            const stepData = recordsToRender.map(r => r.stepCount);
            const screenData = recordsToRender.map(r => r.screenTimeMinutes);

            // ⚠️ 중요: 기존 차트가 있다면 파괴(Destroy)해야 새로 그릴 때 에러가 나지 않습니다.
            if (stepChartInstance) stepChartInstance.destroy();
            if (screenChartInstance) screenChartInstance.destroy();

            // 걸음 수 차트 그리기
            const stepCtx = document.getElementById('stepChart').getContext('2d');
            stepChartInstance = new Chart(stepCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '걸음 수 (보)',
                        data: stepData,
                        borderColor: '#c8902e',
                        backgroundColor: 'rgba(200, 144, 46, 0.15)',
                        pointBackgroundColor: '#e8c884',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: getChartOptions('걸음 수 (보)')
            });

            // 스크린타임 차트 그리기
            const screenCtx = document.getElementById('screenChart').getContext('2d');
            screenChartInstance = new Chart(screenCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '스마트폰 사용 (분)',
                        data: screenData,
                        borderColor: '#e0746b',
                        backgroundColor: 'rgba(224, 116, 107, 0.15)',
                        pointBackgroundColor: '#f4ecd9',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: getChartOptions('사용 시간 (분)')
            });
        }

        // 차트 공통 옵션 추출 (코드 중복 방지)
        function getChartOptions(yAxisTitle) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                color: '#b3a48c',
                scales: {
                    x: { grid: { color: 'rgba(200, 160, 90, 0.08)' }, ticks: { color: '#b3a48c' } },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(200, 160, 90, 0.08)' },
                        ticks: { color: '#b3a48c' },
                        title: { display: true, text: yAxisTitle, color: '#b3a48c' }
                    }
                },
                plugins: { legend: { labels: { color: '#f4ecd9' } } }
            };
        }

        // 🚀 3-1. 기간 선택 입력(달력) 변경 시 최대 7일 제한 적용
        document.getElementById('startDate').addEventListener('change', () => clampDateRange('start'));
        document.getElementById('endDate').addEventListener('change', () => clampDateRange('end'));

        // 🚀 4. 필터링 버튼 이벤트 리스너
        document.getElementById('filterBtn').addEventListener('click', async () => {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            // 선택한 날짜 범위에 맞게 데이터 걸러서 화면 다시 그리기
            renderDashboard(getFilteredRecords());

            // 🚀 바텐더의 상태 분석: 1일 선택 시 그날, 2~7일 선택 시 해당 기간 전체 분석
            await fetchAiReport(startDate, endDate);
        });

        // 🚀 5. 전체보기 버튼 이벤트 리스너
        document.getElementById('resetBtn').addEventListener('click', async () => {
            if (allRecords.length > 0) {
                const lastDate = allRecords[allRecords.length - 1].recordDate;
                document.getElementById('startDate').value = allRecords[0].recordDate;
                document.getElementById('endDate').value = lastDate;

                // 전체보기는 7일 제한과 무관하므로 기간 입력의 min/max 제약을 해제
                document.getElementById('startDate').removeAttribute('min');
                document.getElementById('startDate').removeAttribute('max');
                document.getElementById('endDate').removeAttribute('min');
                document.getElementById('endDate').removeAttribute('max');

                renderDashboard(allRecords);

                // 🚀 바텐더의 상태 분석은 전체 기록 중 마지막 날 하루를 기준으로 갱신
                await fetchAiReport(lastDate, lastDate);
            }
        });

        // 페이지 시작
        loadDashboard();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTender Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* 태번(우드·골드) 테마 + 배경 이미지 */
        body {
            color: #f4ecd9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
            background:
                linear-gradient(rgba(15, 10, 6, 0.74), rgba(15, 10, 6, 0.84)),
                url('/assets/dashboard-bg.jpeg') center center / cover no-repeat fixed;
            background-color: #140f0a;
            min-height: 100vh;
        }
        .serif { font-family: 'Playfair Display', serif; }
        .surface {
            background: linear-gradient(180deg, rgba(42, 30, 17, 0.62), rgba(28, 19, 11, 0.58));
            border: 1px solid rgba(200, 160, 90, 0.22);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s, border-color 0.25s;
        }
        .surface:hover {
            transform: translateY(-3px);
            border-color: rgba(200, 160, 90, 0.4);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
        }
        .accent-text { color: #d9b65a; }
        .danger-text { color: #e0746b; }
        .success-text { color: #9bbd6a; }
        .muted-text { color: #b3a48c; }
        html {
            background-color: #140f0a;
        }
        html,
        body,
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(200, 144, 46, 0.45) rgba(20, 15, 10, 0.92);
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(20, 15, 10, 0.92);
            margin: 6px 0;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(200, 144, 46, 0.4);
            border-radius: 6px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(200, 144, 46, 0.65);
            background-clip: padding-box;
        }
    </style>
</head>
<body class="p-6 md:p-10 min-h-screen">

    <div class="max-w-5xl mx-auto space-y-6">

        <header class="mb-8">
            <h1 class="serif text-3xl font-bold tracking-tight" style="color:#e8c884; text-shadow:0 2px 14px rgba(200,144,46,0.3);">MoodTender Analytics</h1>
            <p class="muted-text text-sm mt-1">스마트폰에서 수집된 나의 생활 패턴과 멘탈 상태를 확인하세요.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">오늘 걸음 수</h3>
                <p id="card-steps" class="text-3xl font-bold accent-text">- 보</p>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">수면 시간</h3>
                <p id="card-sleep" class="text-3xl font-bold" style="color:#c8902e;">- 시간 - 분</p>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h3 class="muted-text font-semibold text-sm mb-2">스마트폰 사용</h3>
                <p id="card-screen" class="text-3xl font-bold danger-text">- 분</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-bold mb-4">주간 걸음 수</h2>
                <div class="relative h-72 w-full">
                    <canvas id="stepChart"></canvas>
                </div>
            </div>
            <div class="surface rounded-2xl p-6 shadow-lg">
                <h2 class="text-lg font-bold mb-4">주간 스마트폰 사용 시간</h2>
                <div class="relative h-72 w-full">
                    <canvas id="screenChart"></canvas>
                </div>
            </div>
        </div>

        <div class="surface rounded-2xl p-6 shadow-lg">
            <div class="flex items-center mb-4 gap-2">
                <span class="text-xl">🥃</span>
                <h2 class="text-lg font-bold">바텐더의 상태 분석</h2>
            </div>
            <div id="ai-report" class="text-sm leading-relaxed p-4 rounded-xl" style="background: rgba(15,10,6,0.5); border: 1px solid rgba(200,160,90,0.15); color:#f4ecd9;">
                데이터를 분석하고 있습니다...
            </div>
        </div>

    </div>

    <script>
        async function loadDashboard() {
            try {
                // 1. 서버에서 DB 데이터 가져오기
                const response = await fetch('/api/web/data');
                const result = await response.json();
                const records = result.data;

                if (!records || records.length === 0) {
                    document.getElementById('ai-report').innerHTML = "아직 수집된 모바일 데이터가 없습니다.";
                    return;
                }

                // 2. 상단 요약 카드 업데이트 (가장 최신 데이터 기준)
                const latest = records[records.length - 1];
                document.getElementById('card-steps').innerText = latest.stepCount.toLocaleString() + ' 보';

                const sleepHours = Math.floor(latest.sleepMinutes / 60);
                const sleepMins = latest.sleepMinutes % 60;
                document.getElementById('card-sleep').innerText = `${sleepHours}시간 ${sleepMins}분`;

                document.getElementById('card-screen').innerText = latest.screenTimeMinutes + ' 분';

                // 3. 차트용 데이터 배열 추출
                const labels = records.map(r => r.recordDate);
                const stepData = records.map(r => r.stepCount);
                const screenData = records.map(r => r.screenTimeMinutes);

                // 4. Chart.js 그래프 그리기 (걸음 수 / 스마트폰 사용 시간 분리)
                const stepCtx = document.getElementById('stepChart').getContext('2d');
                new Chart(stepCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '걸음 수 (보)',
                                data: stepData,
                                borderColor: '#c8902e',
                                backgroundColor: 'rgba(200, 144, 46, 0.15)',
                                pointBackgroundColor: '#e8c884',
                                fill: true,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        color: '#b3a48c', // 범례 글자색
                        scales: {
                            x: {
                                grid: { color: 'rgba(200, 160, 90, 0.08)' },
                                ticks: { color: '#b3a48c' }
                            },
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(200, 160, 90, 0.08)' },
                                ticks: { color: '#b3a48c' },
                                title: { display: true, text: '걸음 수 (보)', color: '#b3a48c' }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: '#f4ecd9' } }
                        }
                    }
                });

                const screenCtx = document.getElementById('screenChart').getContext('2d');
                new Chart(screenCtx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '스마트폰 사용 (분)',
                                data: screenData,
                                borderColor: '#e0746b',
                                backgroundColor: 'rgba(224, 116, 107, 0.15)',
                                pointBackgroundColor: '#f4ecd9',
                                fill: true,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        color: '#b3a48c', // 범례 글자색
                        scales: {
                            x: {
                                grid: { color: 'rgba(200, 160, 90, 0.08)' },
                                ticks: { color: '#b3a48c' }
                            },
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 30, color: '#b3a48c' }, // 30분 단위 눈금
                                grid: { color: 'rgba(200, 160, 90, 0.08)' },
                                title: { display: true, text: '사용 시간 (분)', color: '#b3a48c' }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: '#f4ecd9' } }
                        }
                    }
                });

                // 5. 서버에서 AI 분석 리포트 가져오기
                const aiResponse = await fetch('/api/web/analyze');
                const aiResult = await aiResponse.json();
                document.getElementById('ai-report').innerHTML = aiResult.report;

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('ai-report').innerHTML = "<span style='color:#e0746b;'>서버 연결에 실패했습니다.</span>";
            }
        }

        // 페이지가 열리면 바로 실행
        loadDashboard();
    </script>
</body>
</html>

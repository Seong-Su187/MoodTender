<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTender Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 기존 메인 앱과 동일한 컬러 테마 적용 */
        body {
            background-color: #0d0b13;
            color: #f4f1f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
        }
        .surface { background-color: #18151f; border: 1px solid rgba(255, 255, 255, 0.12); }
        .accent-text { color: #7c4dff; }
        .danger-text { color: #ff6b7a; }
        .success-text { color: #61d394; }
    </style>
</head>
<body class="p-6 md:p-10 min-h-screen">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <header class="mb-8">
            <h1 class="text-2xl font-bold tracking-tight">📊 MoodTender Analytics</h1>
            <p class="text-[#a8a1b3] text-sm mt-1">스마트폰에서 수집된 나의 생활 패턴과 멘탈 상태를 확인하세요.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="surface rounded-xl p-6 shadow-lg">
                <h3 class="text-[#a8a1b3] font-semibold text-sm mb-2">오늘 걸음 수</h3>
                <p id="card-steps" class="text-3xl font-bold accent-text">- 보</p>
            </div>
            <div class="surface rounded-xl p-6 shadow-lg">
                <h3 class="text-[#a8a1b3] font-semibold text-sm mb-2">수면 시간</h3>
                <p id="card-sleep" class="text-3xl font-bold text-[#3dd6c6]">- 시간 - 분</p>
            </div>
            <div class="surface rounded-xl p-6 shadow-lg">
                <h3 class="text-[#a8a1b3] font-semibold text-sm mb-2">스마트폰 사용</h3>
                <p id="card-screen" class="text-3xl font-bold danger-text">- 분</p>
            </div>
        </div>

        <div class="surface rounded-xl p-6 shadow-lg">
            <h2 class="text-lg font-bold mb-4">주간 활동 트렌드</h2>
            <div class="relative h-72 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="surface rounded-xl p-6 shadow-lg bg-gradient-to-br from-[#18151f] to-[#24202d]">
            <div class="flex items-center mb-4 gap-2">
                <span class="text-xl">🤖</span>
                <h2 class="text-lg font-bold">AI 바텐더의 상태 분석</h2>
            </div>
            <div id="ai-report" class="text-[#f4f1f7] text-sm leading-relaxed p-4 bg-[#0d0b13] rounded-lg border border-[rgba(255,255,255,0.05)]">
                데이터를 분석하고 있습니다...
            </div>
        </div>

    </div>

    <script>
        async function loadDashboard() {
            try {
                // 1. 서버에서 DB 데이터 가져오기
                const response = await fetch('/api/web/data');
                const result = await response.json();
                const records = result.data;

                if (!records || records.length === 0) {
                    document.getElementById('ai-report').innerHTML = "아직 수집된 모바일 데이터가 없습니다.";
                    return;
                }

                // 2. 상단 요약 카드 업데이트 (가장 최신 데이터 기준)
                const latest = records[records.length - 1];
                document.getElementById('card-steps').innerText = latest.stepCount.toLocaleString() + ' 보';
                
                const sleepHours = Math.floor(latest.sleepMinutes / 60);
                const sleepMins = latest.sleepMinutes % 60;
                document.getElementById('card-sleep').innerText = `${sleepHours}시간 ${sleepMins}분`;
                
                document.getElementById('card-screen').innerText = latest.screenTimeMinutes + ' 분';

                // 3. 차트용 데이터 배열 추출
                const labels = records.map(r => r.recordDate);
                const stepData = records.map(r => r.stepCount);
                const screenData = records.map(r => r.screenTimeMinutes);

                // 4. Chart.js 그래프 그리기
                const ctx = document.getElementById('trendChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar', // 기본 형태는 막대 그래프
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: '걸음 수 (보)',
                                data: stepData,
                                backgroundColor: '#7c4dff',
                                borderRadius: 4,
                                yAxisID: 'y',
                                order: 2
                            },
                            {
                                label: '스마트폰 사용 (분)',
                                data: screenData,
                                type: 'line', // 스마트폰 사용량은 꺾은선으로 겹쳐서 표시
                                borderColor: '#ff6b7a',
                                backgroundColor: '#ff6b7a',
                                borderWidth: 2,
                                pointBackgroundColor: '#0d0b13',
                                tension: 0.3,
                                yAxisID: 'y1',
                                order: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        color: '#a8a1b3', // 범례 글자색
                        scales: {
                            x: {
                                grid: { color: 'rgba(255, 255, 255, 0.05)' }
                            },
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                title: { display: true, text: '걸음 수', color: '#a8a1b3' }
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                grid: { drawOnChartArea: false },
                                title: { display: true, text: '사용 시간(분)', color: '#a8a1b3' }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: '#f4f1f7' } }
                        }
                    }
                });

                // 5. 서버에서 AI 분석 리포트 가져오기
                const aiResponse = await fetch('/api/web/analyze');
                const aiResult = await aiResponse.json();
                document.getElementById('ai-report').innerHTML = aiResult.report;

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('ai-report').innerHTML = "<span class='text-[#ff6b7a]'>서버 연결에 실패했습니다.</span>";
            }
        }

        // 페이지가 열리면 바로 실행
        loadDashboard();
    </script>
</body>
</html>
